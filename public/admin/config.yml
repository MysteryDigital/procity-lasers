backend:
  name: git-gateway
  branch: main

media_folder: src/assets/images/uploads
public_folder: /src/assets/images/uploads

site_url: https://www.procitylasers.com
display_url: https://www.procitylasers.com

collections:
  - name: projects
    label: Projects
    label_singular: Project
    folder: src/content/projects
    create: true
    extension: json
    format: json
    identifier_field: title
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - label: Category
        name: category
        widget: select
        options:
          - { label: Graffiti Removal, value: graffiti }
          - { label: Heritage Conservation, value: heritage }
          - { label: Fire Damage, value: fire-damage }
          - { label: Industrial Cleaning, value: industrial }
          - { label: Paint Removal, value: paint-removal }
          - { label: Surface Preparation, value: surface-preparation }
      - { label: Caption, name: caption, widget: text, required: false }
      - label: Standalone image
        name: image
        widget: image
        required: false
        hint: "Use this OR the Before/After fields below — not both."
      - label: Standalone image caption
        name: imageCaption
        widget: string
        required: false
        hint: "Optional caption shown below the image."
      - label: Before image
        name: before
        widget: image
        required: false
        hint: "Must be paired with an After image."
      - label: Before image caption
        name: beforeCaption
        widget: string
        required: false
        hint: "Optional caption for the before side of the slider."
      - label: After image
        name: after
        widget: image
        required: false
        hint: "Must be paired with a Before image."
      - label: After image caption
        name: afterCaption
        widget: string
        required: false
        hint: "Optional caption for the after side of the slider."
      - label: Video URL
        name: videoUrl
        widget: string
        required: false
        hint: "YouTube or Vimeo URL. If provided, a video embed will be shown instead of an image."
      - label: Video thumbnail
        name: thumbnail
        widget: image
        required: false
        hint: "Optional still frame for video gallery cards. YouTube thumbnails are fetched automatically if omitted; Vimeo will show a placeholder."

